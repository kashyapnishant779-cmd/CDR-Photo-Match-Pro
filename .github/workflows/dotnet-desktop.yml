name: Build CDR Photo Match Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild CDR_Photo_Match_Pro.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Package EXE
        run: |
          mkdir output
          copy "CDR_Photo_Match_Pro\bin\Release\CDR Photo Match Pro.exe" output\

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: CDR-Photo-Match-Pro-EXE
          path: output
